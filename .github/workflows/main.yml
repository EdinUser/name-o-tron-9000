name: Build Name-o-Tron 9000 App (Cross-Platform)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  # =====================================================
  # LINUX BUILD (runs on YOUR MINT MACHINE)
  # =====================================================
  build-linux:
    runs-on: [self-hosted, mint]
    env:
      SKIP_APT_INSTALL: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Install Linux dependencies
        if: ${{ env.SKIP_APT_INSTALL != 'true' }}
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            pkg-config \
            curl \
            git \
            xdg-utils \
            libfuse2 \
            ca-certificates \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libglib2.0-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Make linuxdeploy binaries executable
        run: |
          # Make downloaded AppImages executable (they're downloaded during build)
          find src-tauri/target/release/bundle/appimage -name "*.AppImage" -type f -exec chmod +x {} \; 2>/dev/null || true

      - name: Install additional linuxdeploy dependencies
        if: ${{ env.SKIP_APT_INSTALL != 'true' }}
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            fuse3 \
            libfuse2 \
            squashfs-tools \
            libglib2.0-0 \
            libgdk-pixbuf2.0-0 \
            libcairo-gobject2 \
            libpango-1.0-0 \
            libatk1.0-0 \
            libcairo2 \
            libgtk-3-0 \
            libgdk-pixbuf2.0-0

      # Tests are run in CI on PRs to main; skipping here for faster release builds.
      # - name: Run tests
      #   run: |
      #     npm run test:ci
      #     cd src-tauri && cargo test

      - name: Build Tauri App (Linux)
        id: tauri-build
        continue-on-error: true
        uses: tauri-apps/tauri-action@v0
        env:
          PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig
          APPIMAGE_EXTRACT_AND_RUN: "1"
          DEBUG: "tauri,bundle,linuxdeploy,appimage"
          RUST_LOG: "tauri_bundler=trace,tauri=trace,info"
          TAURI_LOG: "trace"
          APPIMAGE_TOOL_DEBUG: "1"
          VERBOSE: "1"
          LINUXDEPLOY_LOG_LEVEL: "debug"
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('Release {0}', github.ref_name) || '' }}
          releaseBody: ${{ github.ref_type == 'tag' && 'Cross-platform installers are available below.' || '' }}
          releaseDraft: false
          prerelease: false

      - name: Debug linuxdeploy and AppImage artifacts
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          echo "Build outcome: ${{ steps.tauri-build.outcome }}"
          echo "== Bundle directory tree =="
          find src-tauri/target/release/bundle -maxdepth 4 -type f -printf "%p\n" || true
          APPDIR="src-tauri/target/release/bundle/appimage/name-o-tron-9000.AppDir"
          if [[ -d "$APPDIR" ]]; then
            echo "AppDir contents:"
            find "$APPDIR" -maxdepth 3 -type f -printf "%p\n" || true
          else
            echo "AppDir not found: $APPDIR"
          fi
          echo "Locating linuxdeploy AppImage binaries..."
          LD_BIN=$(find "$HOME/.cache" -name 'linuxdeploy*.AppImage' -print | head -n 1 || true)
          echo "linuxdeploy found: ${LD_BIN:-none}"
          if [[ -n "$LD_BIN" ]]; then
            chmod +x "$LD_BIN" || true
            echo "Running linuxdeploy manually with verbosity 3..."
            APPIMAGE_EXTRACT_AND_RUN=1 "$LD_BIN" --verbosity 3 --appdir "$APPDIR" --plugin gtk --output appimage 2>&1 | tee /tmp/linuxdeploy.log || true
            echo "--- linuxdeploy log tail ---"
            tail -n 200 /tmp/linuxdeploy.log || true
          fi

      - name: Ensure AppImage exists (fail if missing)
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          APPIMAGE_FILE=$(ls src-tauri/target/release/bundle/appimage/*.AppImage 2>/dev/null | head -n 1 || true)
          echo "Detected AppImage: ${APPIMAGE_FILE:-none}"
          if [[ -z "$APPIMAGE_FILE" ]]; then
            echo "AppImage not produced"
            exit 1
          fi

      - name: Show linuxdeploy/appimage logs (if any)
        if: failure()
        run: |
          echo "== Listing appimage bundle dir =="
          ls -la src-tauri/target/release/bundle/appimage || true
          echo "== Tail possible logs =="
          find src-tauri/target/release/bundle/appimage -type f -maxdepth 2 \( -name "*.log" -o -name "*.txt" \) -print -exec tail -n 50 {} \; || true

      - name: Upload Linux installers
        uses: actions/upload-artifact@v4
        with:
          name: tauri-installers-linux
          path: src-tauri/target/release/bundle/

  # =====================================================
  # WINDOWS BUILD (GitHub-hosted)
  # =====================================================
  build-windows:
    # Temporarily disabled while testing Linux-only builds.
    # Remove or change this condition to re-enable Windows builds.
    if: ${{ false }}
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      # Tests are run in CI on PRs to main; skipping here for faster release builds.
      # - name: Run tests
      #   run: |
      #     npm run test:ci
      #     cd src-tauri && cargo test

      - name: Build Tauri App (Windows)
        uses: tauri-apps/tauri-action@v0
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('Release {0}', github.ref_name) || '' }}
          releaseBody: ${{ github.ref_type == 'tag' && 'Cross-platform installers are available below.' || '' }}
          releaseDraft: false
          prerelease: false

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: tauri-installers-windows
          path: src-tauri/target/release/bundle/

  # =====================================================
  # DEPLOY
  # =====================================================
  deploy:
    needs: [build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: installers/

      - name: Generate revision metadata
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="rev-$(date -u +'%Y%m%d-%H%M%S')"
          fi

          DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          echo "{" > release.json
          echo "  \"version\": \"${VERSION}\"," >> release.json
          echo "  \"date\": \"${DATE}\"," >> release.json
          echo "  \"platforms\": {" >> release.json

          echo -n "    \"linux\": [" >> release.json
          ls installers/tauri-installers-linux | sed 's/^/\"/' | sed 's/$/\",/' >> release.json
          echo "    ]," >> release.json

          # Windows builds are currently disabled; keep key for schema compatibility but leave it empty.
          echo "    \"windows\": []" >> release.json

          echo "  }" >> release.json
          echo "}" >> release.json

      # Upload metadata to artifacts
      - name: Upload metadata
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata
          path: release.json

      # Upload to VPS
      - name: Upload installers to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 1022
          source: "installers/**"
          target: "/var/www/name-o-tron.kirilov.dev/web/downloads/"

      - name: Upload release.json
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 1022
          source: "release.json"
          target: "/var/www/name-o-tron.kirilov.dev/web/"

      - name: Fix SPConfig permissions
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 1022
          script: |
            chown -R web22:client1 /var/www/name-o-tron.kirilov.dev/web/
            find /var/www/name-o-tron.kirilov.dev/web/ -type d -exec chmod 755 {} \;
            find /var/www/name-o-tron.kirilov.dev/web/ -type f -exec chmod 644 {} \;
