name: Build Name-o-Tron 9000 App (Cross-Platform)

on:
  workflow_dispatch: # ✅ manual trigger from Actions tab
  push:
    tags:
      - "v*" # ✅ runs automatically when you push a version tag like v1.0.0

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Node.js (frontend)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install Rust (backend)
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      # Install system dependencies for Linux (GTK development libraries)
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libglib2.0-dev

      # Cache npm dependencies
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Run tests (both frontend and backend)
      - name: Run tests
        run: |
          # Run frontend tests (TypeScript checking)
          npm run test:ci
          # Run Rust backend tests
          cd src-tauri && cargo test

      # Build + Package Tauri
      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          # Set PKG_CONFIG_PATH for Linux builds
          PKG_CONFIG_PATH: ${{ matrix.platform == 'ubuntu-latest' && '/usr/lib/x86_64-linux-gnu/pkgconfig' || '' }}
        with:
          # Only publish a release if triggered by a tag
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('Release {0}', github.ref_name) || '' }}
          releaseBody: ${{ github.ref_type == 'tag' && 'Cross-platform installers are available below.' || '' }}
          releaseDraft: false
          prerelease: false

      # Always upload artifacts (manual or tagged builds)
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: tauri-installers-${{ matrix.platform }}
          path: src-tauri/target/release/bundle/
