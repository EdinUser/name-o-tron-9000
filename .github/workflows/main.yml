name: Build Name-o-Tron 9000 App (Cross-Platform)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libglib2.0-dev

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: |
          npm run test:ci
          cd src-tauri && cargo test

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          PKG_CONFIG_PATH: ${{ matrix.platform == 'ubuntu-latest' && '/usr/lib/x86_64-linux-gnu/pkgconfig' || '' }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('Release {0}', github.ref_name) || '' }}
          releaseBody: ${{ github.ref_type == 'tag' && 'Cross-platform installers are available below.' || '' }}
          releaseDraft: false
          prerelease: false

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: tauri-installers-${{ matrix.platform }}
          path: src-tauri/target/release/bundle/

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: installers/

      # -----------------------------------------
      # Generate metadata JSON for the landing page
      # -----------------------------------------
      - name: Generate revision metadata
        run: |
          VERSION="${GITHUB_REF##*/}"
          DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "{" > release.json
          echo "  \"version\": \"${VERSION}\"," >> release.json
          echo "  \"date\": \"${DATE}\"," >> release.json
          echo "  \"platforms\": {" >> release.json

          echo -n "    \"linux\": [" >> release.json
          ls installers/tauri-installers-ubuntu-latest | sed 's/^/\"/' | sed 's/$/\",/' >> release.json
          echo "    ]," >> release.json

          echo -n "    \"windows\": [" >> release.json
          ls installers/tauri-installers-windows-latest | sed 's/^/\"/' | sed 's/$/\",/' >> release.json
          echo "    ]," >> release.json

          echo -n "    \"macos\": [" >> release.json
          ls installers/tauri-installers-macos-latest | sed 's/^/\"/' | sed 's/$/\",/' >> release.json
          echo "    ]" >> release.json

          echo "  }" >> release.json
          echo "}" >> release.json

      - name: Upload revision metadata
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata
          path: release.json

      # -----------------------------------------
      # Deploy installers to VPS
      # -----------------------------------------
      - name: Upload installers to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 1022
          source: "installers/**"
          target: "/var/www/name-o-tron.kirilov.dev/web/downloads/"

      - name: Upload release metadata JSON
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 1022
          source: "release.json"
          target: "/var/www/name-o-tron.kirilov.dev/web/"

      # -----------------------------------------
      # Fix SPConfig permissions
      # -----------------------------------------
      - name: Fix permissions for SPConfig
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 1022
          script: |
            chown -R web22:client1 /var/www/name-o-tron.kirilov.dev/web/
            find /var/www/name-o-tron.kirilov.dev/web/ -type d -exec chmod 755 {} \;
            find /var/www/name-o-tron.kirilov.dev/web/ -type f -exec chmod 644 {} \;
