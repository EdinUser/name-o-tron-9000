name: Build Name-o-Tron 9000 App (Cross-Platform)

on:
  workflow_dispatch: # ✅ manual trigger from Actions tab
  push:
    tags:
      - "v*" # still runs automatically when you push a tag like v1.0.0

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Node.js (frontend)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install Rust (backend)
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      # Cache npm/yarn/pnpm dependencies
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/yarn
            ~/.pnpm-store
          key: ${{ runner.os }}-deps-${{ hashFiles('**/package-lock.json', '**/yarn.lock', '**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      # Build + Package Tauri
      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        with:
          # Use tag name if present, otherwise use workflow run ID
          tagName: ${{ github.ref_name || github.run_id }}
          releaseName: "Build ${{ github.ref_name || format('manual-run-{0}', github.run_id) }}"
          releaseBody: "Cross-platform installers are available below."
          releaseDraft: false
          prerelease: false

      # Optional: Upload build artifacts directly to workflow run
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: tauri-installers-${{ matrix.platform }}
          path: src-tauri/target/release/bundle/
