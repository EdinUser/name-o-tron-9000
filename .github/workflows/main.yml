name: Build Name-o-Tron 9000 App (Cross-Platform)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  # =====================================================
  # LINUX BUILD (runs on YOUR MINT MACHINE)
  # =====================================================
  build-linux:
    runs-on: [self-hosted, mint]
    container:
      image: ubuntu:22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          apt-get update
          apt-get install -y \
            build-essential \
            pkg-config \
            curl \
            git \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libglib2.0-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: |
          npm run test:ci
          cd src-tauri && cargo test

      - name: Build Tauri App (Linux)
        uses: tauri-apps/tauri-action@v0
        env:
          PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('Release {0}', github.ref_name) || '' }}
          releaseBody: ${{ github.ref_type == 'tag' && 'Cross-platform installers are available below.' || '' }}
          releaseDraft: false
          prerelease: false

      - name: Upload Linux installers
        uses: actions/upload-artifact@v4
        with:
          name: tauri-installers-linux
          path: src-tauri/target/release/bundle/

  # =====================================================
  # WINDOWS BUILD (GitHub-hosted)
  # =====================================================
  build-windows:
    # Temporarily disabled while testing Linux-only builds.
    # Remove or change this condition to re-enable Windows builds.
    if: ${{ false }}
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: |
          npm run test:ci
          cd src-tauri && cargo test

      - name: Build Tauri App (Windows)
        uses: tauri-apps/tauri-action@v0
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('Release {0}', github.ref_name) || '' }}
          releaseBody: ${{ github.ref_type == 'tag' && 'Cross-platform installers are available below.' || '' }}
          releaseDraft: false
          prerelease: false

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: tauri-installers-windows
          path: src-tauri/target/release/bundle/

  # =====================================================
  # DEPLOY
  # =====================================================
  deploy:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: installers/

      - name: Generate revision metadata
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="rev-$(date -u +'%Y%m%d-%H%M%S')"
          fi

          DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          echo "{" > release.json
          echo "  \"version\": \"${VERSION}\"," >> release.json
          echo "  \"date\": \"${DATE}\"," >> release.json
          echo "  \"platforms\": {" >> release.json

          echo -n "    \"linux\": [" >> release.json
          ls installers/tauri-installers-linux | sed 's/^/\"/' | sed 's/$/\",/' >> release.json
          echo "    ]," >> release.json

          echo -n "    \"windows\": [" >> release.json
          ls installers/tauri-installers-windows | sed 's/^/\"/' | sed 's/$/\",/' >> release.json
          echo "    ]" >> release.json

          echo "  }" >> release.json
          echo "}" >> release.json

      # Upload metadata to artifacts
      - name: Upload metadata
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata
          path: release.json

      # Upload to VPS
      - name: Upload installers to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 1022
          source: "installers/**"
          target: "/var/www/name-o-tron.kirilov.dev/web/downloads/"

      - name: Upload release.json
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 1022
          source: "release.json"
          target: "/var/www/name-o-tron.kirilov.dev/web/"

      - name: Fix SPConfig permissions
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 1022
          script: |
            chown -R web22:client1 /var/www/name-o-tron.kirilov.dev/web/
            find /var/www/name-o-tron.kirilov.dev/web/ -type d -exec chmod 755 {} \;
            find /var/www/name-o-tron.kirilov.dev/web/ -type f -exec chmod 644 {} \;
