name: Build Name-o-Tron 9000 App (Cross-Platform)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  # =====================================================
  # LINUX BUILD (GitHub-hosted)
  # =====================================================
  build-linux:
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          clean: true

      - name: Verify Linux bundle assets
        run: |
          set -euo pipefail
          test -f src-tauri/linux/name-o-tron-9000.desktop.hbs
          test -f src-tauri/linux/com.lenivec.name-o-tron-9000.metainfo.xml

      - name: Build Linux installers in shared container
        run: |
          set -euo pipefail
          bash scripts/build-linux-bundles.sh

      # Tests are run in CI on PRs to develop and main; skipping here for post-merge build speed.
      # - name: Run tests
      #   run: |
      #     npm run test:types
      #     npm test
      #     npm run test:rust

      - name: Upload Linux installers
        uses: actions/upload-artifact@v7
        with:
          name: tauri-installers-linux
          path: src-tauri/target/release/bundle/
          retention-days: 7

  # =====================================================
  # WINDOWS BUILD (GitHub-hosted)
  # =====================================================
  build-windows:
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Read version from package.json
        id: app-version-win
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Windows build version: $version"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install dependencies
        run: npm ci

      # Tests are run in CI on PRs to develop and main; skipping here for post-merge build speed.
      # - name: Run tests
      #   run: |
      #     npm run test:types
      #     npm test
      #     npm run test:rust

      - name: Build Tauri App (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_BUILD_VERSION: ${{ steps.app-version-win.outputs.version }}
        with:
          releaseDraft: false
          prerelease: false

      - name: Upload Windows installers
        uses: actions/upload-artifact@v7
        with:
          name: tauri-installers-windows
          path: src-tauri/target/release/bundle/
          retention-days: 7

  # =====================================================
  # DEPLOY
  # =====================================================
  deploy:
    if: ${{ github.ref == 'refs/heads/main' }}
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Read version from package.json
        id: app-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Download all installers
        uses: actions/download-artifact@v8
        with:
          path: installers/

      - name: Stage installers for upload
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.app-version.outputs.version }}"
          STAGE="upload/${VERSION}"
          mkdir -p "$STAGE"
          find installers -type f \( -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" -o -name "*.exe" -o -name "*.msi" -o -name "*.dmg" \) -exec cp {} "$STAGE"/ \;
          ls -lah "$STAGE"

      - name: Generate revision metadata
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.app-version.outputs.version }}"
          DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          python scripts/generate_release.py "$VERSION" "$DATE"

      # Upload metadata to artifacts
      - name: Upload metadata
        uses: actions/upload-artifact@v7
        with:
          name: release-metadata
          path: release.json

      - name: Create remote release directories
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 10222
          script: |
            set -euo pipefail
            VERSION="${{ steps.app-version.outputs.version }}"
            mkdir -p "/var/www/name-o-tron.kirilov.dev/web/downloads/${VERSION}"
            mkdir -p "/var/www/name-o-tron.kirilov.dev/web/${VERSION}"

      # Test SSH connectivity to VPS
      - name: Test SSH connectivity
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 10222
          script: echo "SSH OK"

      # Upload to VPS
      - name: Upload installers to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 10222
          source: "upload/${{ steps.app-version.outputs.version }}/**"
          strip_components: 2
          target: "/var/www/name-o-tron.kirilov.dev/web/downloads/${{ steps.app-version.outputs.version }}/"

      - name: Upload release.json
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 10222
          source: "release.json"
          target: "/var/www/name-o-tron.kirilov.dev/web/${{ steps.app-version.outputs.version }}/"

      - name: Upload release.json (latest pointer)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 10222
          source: "release.json"
          target: "/var/www/name-o-tron.kirilov.dev/web/"

      - name: Fix SPConfig permissions
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 10222
          script: |
            chown -R web22:client1 /var/www/name-o-tron.kirilov.dev/web/
            find /var/www/name-o-tron.kirilov.dev/web/ -type d -exec chmod 755 {} \;
            find /var/www/name-o-tron.kirilov.dev/web/ -type f -exec chmod 644 {} \;
