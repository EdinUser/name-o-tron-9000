name: Build Name-o-Tron 9000 App (Cross-Platform)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  # =====================================================
  # LINUX BUILD (runs on YOUR MINT MACHINE)
  # =====================================================
  build-linux:
    runs-on: [self-hosted, mint]
    env:
      SKIP_APT_INSTALL: "true"

    steps:
      - name: Read version from package.json
        id: app-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Install Linux dependencies
        if: ${{ env.SKIP_APT_INSTALL != 'true' }}
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            pkg-config \
            curl \
            git \
            xdg-utils \
            libfuse2 \
            ca-certificates \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libglib2.0-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Make linuxdeploy binaries executable
        run: |
          # Make downloaded AppImages executable (they're downloaded during build)
          find src-tauri/target/release/bundle/appimage -name "*.AppImage" -type f -exec chmod +x {} \; 2>/dev/null || true

      - name: Install additional linuxdeploy dependencies
        if: ${{ env.SKIP_APT_INSTALL != 'true' }}
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            fuse3 \
            libfuse2 \
            squashfs-tools \
            libglib2.0-0 \
            libgdk-pixbuf2.0-0 \
            libcairo-gobject2 \
            libpango-1.0-0 \
            libatk1.0-0 \
            libcairo2 \
            libgtk-3-0 \
            libgdk-pixbuf2.0-0

      # Tests are run in CI on PRs to main; skipping here for faster release builds.
      # - name: Run tests
      #   run: |
      #     npm run test:ci
      #     cd src-tauri && cargo test

      - name: Build Tauri App (Linux)
        uses: tauri-apps/tauri-action@v0
        env:
          PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig
          APPIMAGE_EXTRACT_AND_RUN: "1"
          TAURI_BUILD_VERSION: ${{ steps.app-version.outputs.version }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('Release {0}', github.ref_name) || format('Release {0}', steps.app-version.outputs.version) }}
          releaseBody: ${{ github.ref_type == 'tag' && 'Cross-platform installers are available below.' || format('Build {0}', steps.app-version.outputs.version) }}
          releaseDraft: false
          prerelease: false

      - name: Upload Linux installers
        uses: actions/upload-artifact@v4
        with:
          name: tauri-installers-linux
          path: src-tauri/target/release/bundle/

  # =====================================================
  # WINDOWS BUILD (GitHub-hosted)
  # =====================================================
  build-windows:
    # Temporarily disabled while testing Linux-only builds.
    # Remove or change this condition to re-enable Windows builds.
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Read version from package.json
        id: app-version-win
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Windows build version: $version"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      # Tests are run in CI on PRs to main; skipping here for faster release builds.
      # - name: Run tests
      #   run: |
      #     npm run test:ci
      #     cd src-tauri && cargo test

      - name: Build Tauri App (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_BUILD_VERSION: ${{ steps.app-version-win.outputs.version }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('Release {0}', github.ref_name) || '' }}
          releaseBody: ${{ github.ref_type == 'tag' && 'Cross-platform installers are available below.' || '' }}
          releaseDraft: false
          prerelease: false

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: tauri-installers-windows
          path: src-tauri/target/release/bundle/

  # =====================================================
  # DEPLOY
  # =====================================================
  deploy:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version from package.json
        id: app-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: installers/

      - name: Stage installers for upload
        run: |
          set -euo pipefail
          VERSION="${{ steps.app-version.outputs.version }}"
          STAGE="upload/${VERSION}"
          mkdir -p "$STAGE"
          find installers -type f \( -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" -o -name "*.exe" -o -name "*.msi" -o -name "*.dmg" \) -exec cp {} "$STAGE"/ \;
          ls -lah "$STAGE"

      - name: Generate revision metadata
        run: |
          set -euo pipefail
          VERSION="${{ steps.app-version.outputs.version }}"
          DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          python scripts/generate_release.py "$VERSION" "$DATE"

      # Upload metadata to artifacts
      - name: Upload metadata
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata
          path: release.json

      # Test SSH connectivity to VPS
      - name: Test SSH connectivity
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 10222
          script: echo "SSH OK"

      # Upload to VPS
      - name: Upload installers to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 10222
          source: "upload/${{ steps.app-version.outputs.version }}/**"
          target: "/var/www/name-o-tron.kirilov.dev/web/downloads/${{ steps.app-version.outputs.version }}/"

      - name: Upload release.json
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 10222
          source: "release.json"
          target: "/var/www/name-o-tron.kirilov.dev/web/${{ steps.app-version.outputs.version }}/"

      - name: Upload release.json (latest pointer)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 10222
          source: "release.json"
          target: "/var/www/name-o-tron.kirilov.dev/web/"

      - name: Fix SPConfig permissions
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 10222
          script: |
            chown -R web22:client1 /var/www/name-o-tron.kirilov.dev/web/
            find /var/www/name-o-tron.kirilov.dev/web/ -type d -exec chmod 755 {} \;
            find /var/www/name-o-tron.kirilov.dev/web/ -type f -exec chmod 644 {} \;

