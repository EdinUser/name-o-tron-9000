name: Build Name-o-Tron 9000 App (Cross-Platform)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  validate-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.app-version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Read version from package.json
        id: app-version
        run: |
          VERSION="$(node -p 'require("./package.json").version')"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release workflow version: ${VERSION}"

      - name: Validate release tag matches package version
        if: ${{ github.event_name == 'push' }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.app-version.outputs.version }}"
          EXPECTED_TAG="v${VERSION}"
          if [ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match package.json version ${VERSION}; expected ${EXPECTED_TAG}."
            exit 1
          fi

      - name: Validate release tag is on main
        if: ${{ github.event_name == 'push' }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --prune
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "Release tag ${GITHUB_REF_NAME} does not point to a commit contained in origin/main."
            exit 1
          fi

  # =====================================================
  # LINUX BUILD (GitHub-hosted)
  # =====================================================
  build-linux:
    needs: validate-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          clean: true

      - name: Verify Linux bundle assets
        run: |
          set -euo pipefail
          test -f src-tauri/linux/name-o-tron-9000.desktop.hbs
          test -f src-tauri/linux/com.lenivec.name-o-tron-9000.metainfo.xml

      - name: Build Linux installers in shared container
        run: |
          set -euo pipefail
          bash scripts/build-linux-bundles.sh

      # Tests are run in CI on PRs to develop and main; skipping here for post-merge build speed.
      # - name: Run tests
      #   run: |
      #     npm run test:types
      #     npm test
      #     npm run test:rust

      - name: Upload Linux installers
        uses: actions/upload-artifact@v7
        with:
          name: tauri-installers-linux
          path: src-tauri/target/release/bundle/
          retention-days: 7

  # =====================================================
  # WINDOWS BUILD (GitHub-hosted)
  # =====================================================
  build-windows:
    needs: validate-release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install dependencies
        run: npm ci

      # Tests are run in CI on PRs to develop and main; skipping here for post-merge build speed.
      # - name: Run tests
      #   run: |
      #     npm run test:types
      #     npm test
      #     npm run test:rust

      - name: Build Tauri App (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_BUILD_VERSION: ${{ needs.validate-release.outputs.version }}
        with:
          releaseDraft: false
          prerelease: false

      - name: Upload Windows installers
        uses: actions/upload-artifact@v7
        with:
          name: tauri-installers-windows
          path: src-tauri/target/release/bundle/
          retention-days: 7

  # =====================================================
  # DEPLOY
  # =====================================================
  deploy:
    needs: [validate-release, build-linux, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download all installers
        uses: actions/download-artifact@v8
        with:
          path: installers/

      - name: Stage installers for upload
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.validate-release.outputs.version }}"
          STAGE="upload/${VERSION}"
          mkdir -p "$STAGE"
          find installers -type f \( -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" -o -name "*.exe" -o -name "*.msi" -o -name "*.dmg" \) -exec cp {} "$STAGE"/ \;
          ls -lah "$STAGE"

      - name: Generate revision metadata
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.validate-release.outputs.version }}"
          DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          python scripts/generate_release.py "$VERSION" "$DATE"

      # Upload metadata to artifacts
      - name: Upload metadata
        uses: actions/upload-artifact@v7
        with:
          name: release-metadata
          path: release.json

      - name: Create remote release directories
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 10222
          script: |
            set -euo pipefail
            VERSION="${{ needs.validate-release.outputs.version }}"
            mkdir -p "/var/www/name-o-tron.kirilov.dev/web/downloads/${VERSION}"
            mkdir -p "/var/www/name-o-tron.kirilov.dev/web/${VERSION}"

      # Test SSH connectivity to VPS
      - name: Test SSH connectivity
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 10222
          script: echo "SSH OK"

      # Upload to VPS
      - name: Upload installers to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 10222
          source: "upload/${{ needs.validate-release.outputs.version }}/**"
          strip_components: 2
          target: "/var/www/name-o-tron.kirilov.dev/web/downloads/${{ needs.validate-release.outputs.version }}/"

      - name: Upload release.json
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 10222
          source: "release.json"
          target: "/var/www/name-o-tron.kirilov.dev/web/${{ needs.validate-release.outputs.version }}/"

      - name: Upload release.json (latest pointer)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 10222
          source: "release.json"
          target: "/var/www/name-o-tron.kirilov.dev/web/"

      - name: Fix SPConfig permissions
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 10222
          script: |
            chown -R web22:client1 /var/www/name-o-tron.kirilov.dev/web/
            find /var/www/name-o-tron.kirilov.dev/web/ -type d -exec chmod 755 {} \;
            find /var/www/name-o-tron.kirilov.dev/web/ -type f -exec chmod 644 {} \;

  # =====================================================
  # RELEASE DOCS REFRESH
  # =====================================================
  deploy-docs:
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch latest release.json from VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          scp -P 10222 -i ~/.ssh/vps_key -o StrictHostKeyChecking=no root@"$VPS_HOST":/var/www/name-o-tron.kirilov.dev/web/release.json ./release.json

      - name: Install MkDocs
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-docs.txt

      - name: Build MkDocs site
        env:
          DISABLE_MKDOCS_2_WARNING: "true"
        run: mkdocs build --clean --site-dir site

      - name: Sync site to VPS (preserve downloads & release.json)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          rsync -avz --delete \
            --exclude 'downloads/' \
            --exclude 'release.json' \
            --exclude 'community/' \
            -e "ssh -i ~/.ssh/vps_key -p 10222 -o StrictHostKeyChecking=no" \
            site/ root@"$VPS_HOST":/var/www/name-o-tron.kirilov.dev/web/

      - name: Fix ISPConfig permissions
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 10222
          script: |
            chown -R web22:client1 /var/www/name-o-tron.kirilov.dev/web/
            find /var/www/name-o-tron.kirilov.dev/web/ -type d -exec chmod 755 {} \;
            find /var/www/name-o-tron.kirilov.dev/web/ -type f -exec chmod 644 {} \;
