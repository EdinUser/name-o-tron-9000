name: CI

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Linux self-hosted (Mint) – runs everything inside an Ubuntu container
  test-linux:
    # if: ${{ false }}
    runs-on: mint
    container:
      image: ubuntu:22.04

    steps:
      - name: Install system dependencies inside container
        run: |
          apt-get update
          apt-get install -y \
            curl \
            git \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libglib2.0-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            pkg-config \
            build-essential

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Run frontend type checking
        run: npm run test:ci

      - name: Run frontend tests
        run: npm run test:run

      - name: Run Rust tests
        working-directory: ./src-tauri
        run: cargo test

      - name: Run Rust integration tests
        working-directory: ./src-tauri
        run: cargo test --test integration_tests

  # Windows GitHub-hosted runner – kept as before
  test-windows:
    # if: ${{ false }}

    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install system dependencies (Windows)
        run: echo "WebView2 runtime is already available"

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Run frontend type checking
        run: npm run test:ci

      - name: Run frontend tests
        run: npm run test:run

      - name: Run Rust tests
        working-directory: ./src-tauri
        run: cargo test

      - name: Run Rust integration tests
        working-directory: ./src-tauri
        run: cargo test --test integration_tests
