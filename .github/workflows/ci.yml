name: CI

on:
  pull_request:
    branches: [ main, develop ]
    types: [opened, synchronize, reopened, edited]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-pr-route:
    runs-on: ubuntu-latest

    steps:
      - name: Enforce PR routing policy
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.base_ref }}" = "main" ] && [ "${{ github.head_ref }}" != "develop" ]; then
            echo "Pull requests into main must come from develop."
            exit 1
          fi

  # Linux self-hosted (Mint) – runs everything inside an Ubuntu container
  test-linux:
    needs: validate-pr-route
    # if: ${{ false }}
    runs-on: [self-hosted, linux, mint]
    container:
      image: ubuntu:22.04

    steps:
      - name: Install system dependencies inside container
        run: |
          apt-get update
          apt-get install -y \
            curl \
            git \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libglib2.0-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            pkg-config \
            build-essential

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Run frontend type checking
        run: npm run test:types

      - name: Run frontend tests
        run: npm test

      - name: Run Rust tests
        run: npm run test:rust

      - name: Run Rust integration tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --test integration_tests

      - name: Restore workspace ownership for self-hosted runner
        if: ${{ always() }}
        run: |
          set -euo pipefail
          workspace_parent="$(dirname "$GITHUB_WORKSPACE")"
          runner_owner="$(stat -c '%u:%g' "$workspace_parent")"
          chown -R "$runner_owner" "$GITHUB_WORKSPACE"

  # Windows GitHub-hosted runner – kept as before
  test-windows:
    needs: validate-pr-route
    # if: ${{ false }}
    if: ${{ github.base_ref == 'main' }}
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install system dependencies (Windows)
        run: echo "WebView2 runtime is already available"

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Run frontend type checking
        run: npm run test:types

      - name: Run frontend tests
        run: npm test

      - name: Run Rust tests
        run: npm run test:rust

      - name: Run Rust integration tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --test integration_tests
