<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 280">
  <g fill="none" stroke="#000" stroke-width="8">
    <rect x="48" y="32" width="160" height="160" rx="80" fill="#4a5568"/>
    <circle cx="128" cy="96" r="43" fill="#2d3748" stroke="#000" stroke-width="6"/>
    <circle cx="128" cy="96" r="28" fill="#48bb78"/>
    <path d="M92 144 q36 36 72 0" stroke="#000" stroke-width="6" fill="none" stroke-linecap="round"/>
    <rect x="32" y="88" width="20" height="40" rx="6" fill="#4a5568"/>
    <rect x="204" y="88" width="20" height="40" rx="6" fill="#4a5568"/>
    <rect x="88" y="192" width="80" height="24" rx="8" fill="#4a5568"/>
    <!-- Plate -->
    <rect x="56" y="220" width="144" height="40" rx="10" fill="#a0aec0"/>
  </g>
  <g transform="translate(90,226) scale(0.58)" fill="black">
    <defs>
      <rect id="segH" x="0" y="0" width="24" height="8"/> <!-- double height -->
      <rect id="segV" x="0" y="0" width="8" height="20"/> <!-- double width -->
    </defs>
    <g>
      <use href="#segH" x="0" y="0"/>
      <use href="#segV" x="16" y="0"/>
      <use href="#segV" x="16" y="20"/>
      <use href="#segH" x="0" y="20"/>
      <use href="#segV" x="0" y="0"/>
      <use href="#segH" x="0" y="40"/>
    </g>
    <g transform="translate(40,0)">
      <use href="#segH" x="0" y="0"/>
      <use href="#segV" x="0" y="0"/>
      <use href="#segV" x="16" y="0"/>
      <use href="#segV" x="0" y="20"/>
      <use href="#segV" x="16" y="20"/>
      <use href="#segH" x="0" y="40"/>
    </g>
    <g transform="translate(80,0)">
      <use href="#segH" x="0" y="0"/>
      <use href="#segV" x="0" y="0"/>
      <use href="#segV" x="16" y="0"/>
      <use href="#segV" x="0" y="20"/>
      <use href="#segV" x="16" y="20"/>
      <use href="#segH" x="0" y="40"/>
    </g>
    <g transform="translate(120,0)">
      <use href="#segH" x="0" y="0"/>
      <use href="#segV" x="0" y="0"/>
      <use href="#segV" x="16" y="0"/>
      <use href="#segV" x="0" y="20"/>
      <use href="#segV" x="16" y="20"/>
      <use href="#segH" x="0" y="40"/>
    </g>
  </g>
</svg>
